server:
  port: 8080

spring:
  application:
    name: regulatory-policy-alignment

  datasource:
    url: jdbc:postgresql://localhost:5432/regulatory_db?options=-c%20TimeZone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/regulatory_db?options=-c%20TimeZone=UTC
    user: postgres
    password: postgres