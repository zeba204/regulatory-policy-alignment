server:
  port: 8080

spring:
  application:
    name: regulatory-policy-alignment

  datasource:
    url: jdbc:postgresql://localhost:5432/regulatory_db?options=-c%20TimeZone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # ❌ REMOVE THIS (Hibernate auto-detects it)
        # dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/regulatory_db?options=-c%20TimeZone=UTC
    user: postgres
    password: postgres

  mail:
    host: localhost
    port: 1025

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false