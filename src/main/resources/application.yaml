spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/regulatory_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: simple

server:
  port: 8080