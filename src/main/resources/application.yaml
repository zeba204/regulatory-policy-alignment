server:
  port: 8080

spring:
  application:
    name: regulatory-policy-alignment

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false